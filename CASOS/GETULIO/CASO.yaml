# =====================================================================
# CASO.yaml — FONTE DA VERDADE deste caso (SOJ, blueprint secao 3).
# Modelo comentado completo: ESCRITORIO/MODELOS/CASO.schema.yaml
# Regra de ouro: informacao vive AQUI, uma unica vez. Views sao geradas.
# IDs estaveis: PT=parte, F=fato, P=prova, PED=pedido, PZ=prazo, PEN=pendencia.
# =====================================================================

caso:
  id: 2026-0005
  titulo: "Weslley Macedo x Getulio — Obrigacao de Fazer (JEC Parauapebas)"
  area: civel                # familia | consumidor | bancario | ...
  modulo: a_definir            # ex.: familia/alimentos_guarda_convivencia
  complexidade: padrao  # simples | padrao | complexo (D9)
  fase: E1_intake               # fase interna: E1_intake | E2_estrategia | E3_minuta | E4_protocolo | ativo | encerrado
  fase_processual: decisoria  # sentenca de 15/07/2026 (DIARIO #007-#008); era pre_protocolo (desatualizado desde a criacao)
  comarca: "Parauapebas/PA"
  polo: passivo                # ativo (autor) | passivo (reu/executado — MODO DEFESA: G1 ganha item zero do prazo de resposta)
  segredo_justica: false  # true quando ha menores / dados sensiveis
  gates:
    G1: {status: pendente}
    G2: {status: pendente}
    G3: {status: pendente}

partes: []
# - { id: PT01, papel: autora_representante, nome: "...", cpf: "...",
#     renda_mensal: 0.00, qualificacao: completa }
# - { id: PT02, papel: reu, nome: "...",
#     endereco: { status: nao_confirmado, pendencia: PEN01 } }

fatos: []
# status: provado | alegado | controverso. Provado exige prova; sem prova,
# abrir pendencia (ou campo justificativa: "...").
# - { id: F01, descricao: "...", status: alegado, provas: [], pendencias: [PEN01] }

provas: []
# Registradas pelo receber_documento.py — nao preencher a mao sem necessidade.
# - { id: P01, doc: "01_documentos/DOC-01_....pdf", original: "00_originais/...",
#     o_que_prova: "...", forca: plena, fragilidade: null }

pedidos: []
# - { id: PED01, tipo: ..., parametro: "... — DECISAO_SISTEMA #NNN",
#     fundamentos: [CC:art1694], fatos: [F01] }

fundamentos_citados: []
# Espelho local da BASE_LEGAL (D6). validade_dias: 90 padrao / 30 alterada.
# nucleo: true => rechecagem obrigatoria na vespera do protocolo (G3).
# - { ref: "CC:art1694", verificado_em: 2026-01-01, status: vigente,
#     validade_dias: 90, nucleo: true }

financeiro:
  contrato:
    tipo: a_definir     # fixo | percentual | exito | misto | probono
    valor: 0.00
    parcelas: 0
    doc_assinado: false         # true quando o contrato assinado for arquivado (DOC-NN)
  custas: []
  # - { data: 2026-01-01, descricao: "custas iniciais", valor: 0.00 }
  recebimentos: []
  # - { data: 2026-01-01, descricao: "parcela 1/N", valor: 0.00 }

audiencias:
- data: '2026-07-08'
  hora: 11:00
  tipo: instrucao
  local: Vara do JEC de Parauapebas (hibrida - Teams Sala 2)
  status: realizada          # ata fls. 71 dos autos (DIARIO #007); dep. pessoal do reu gravado (3 videos MP4 no PJe)
  pasta: AUDIENCIAS/2026-07-08_instrucao/
# - { data: 2026-01-01, hora: "09:00", tipo: instrucao, local: "...", status: designada }

prazos:
- id: PZ01
  descricao: AUDIENCIA de instrucao (11:00, Vara do JEC de Parauapebas (hibrida - Teams Sala 2))
  data: '2026-07-08'
  criticidade: alta
  status: cumprido           # audiencia REALIZADA em 08/07 (ata fls. 71, DIARIO #007); baixa em 15/07/2026
- id: PZ02
  descricao: 'RECURSO INOMINADO contra a sentenca de 15/07/2026 (parcial procedencia; Num. 182402245, fls. 71-75) — 10 dias uteis (art. 42 c/c 12-A, Lei 9.099/95). VENCIMENTO ESTIMADO (pior caso): termo inicial ainda NAO disparado — sentenca assinada 15/07 14:02, aguardando disponibilizacao no DJEN (radar diario captura). Memoria de calculo completa: DIARIO #008.'
  data: '2026-07-30'
  criticidade: alta
  processo: 0817105-93.2025.8.14.0040
  estado: sugerido           # NAO confirmar sem o advogado (ordem de 15/07/2026)
  confianca: media
# - { id: PZ01, descricao: "...", data: 2026-01-01, criticidade: alta }
# Caso genuinamente sem prazos: registrar NOTA "SEM PRAZOS" no DIARIO.

pendencias:
- id: PEN01
  descricao: 'Contrato de honorarios ASSINADO e arquivado como DOC-NN (pendencia padrao do intake — Onda 1/F6; NAO bloqueia protocolo: regularizavel em qualquer fase); preencher financeiro.contrato'
  responsavel: cliente
  prioridade: alta
  bloqueia: []
  mensagem_cliente: o contrato de honorarios assinado (posso te mandar pelo WhatsApp para assinar digital)
# responsavel: cliente | advogado | terceiro; prioridade: critica|alta|media|baixa
# critica DEVE ter bloqueia: [G2] e/ou [G3]. status: aberta (padrao) | resolvida.
# mensagem_cliente: versao leiga p/ checklist WhatsApp (opcional).
# - { id: PEN01, descricao: "...", responsavel: cliente, prioridade: critica,
#     bloqueia: [G3], mensagem_cliente: "..." }
# Bloco arquivado em 15/07/2026 — substituido pelos autos pos-audiencia
# (autorizacao do titular na mesma data; originais antigos permanecem lacrados
# em 00_originais/ — imutaveis). Ver DIARIO.
