pendencias:
- id: PEN01
  descricao: 'Contrato de honorarios ASSINADO e arquivado como DOC-NN (pendencia padrao do intake — Onda 1/F6; NAO bloqueia protocolo: regularizavel em qualquer fase); preencher financeiro.contrato'
  responsavel: cliente
  prioridade: alta
  bloqueia: []
  mensagem_cliente: o contrato de honorarios assinado (posso te mandar pelo WhatsApp para assinar digital)
- id: PEN02
  descricao: 'LER os dois documentos que sao SCAN sem camada de texto: o CONTRATO DE CONSORCIO (P01, 12 paginas) e o BOLETIM DE OCORRENCIA (P02, 1 pagina). Ate serem lidos, F04 tem os termos exatos do instrumento em aberto e F07 fica como ALEGADO. Sao a espinha dorsal do pedido: precisam de OCR local ou leitura pelo advogado.'
  responsavel: advogado
  prioridade: critica
  bloqueia: [G2, G3]
- id: PEN03
  descricao: 'Confirmar a qualificacao e o endereco das RES: o contrato de honorarios diz "Avenida Rio Grande, n. 155" e a preposta enviou no WhatsApp "Rua Rio Grande, N 156, bairro Beira Rio, em cima do outlet do 20". Divergencia de via e numero — conferir cartao CNPJ das duas empresas antes de distribuir (citacao).'
  responsavel: advogado
  prioridade: alta
  bloqueia: [G3]
- id: PEN04
  descricao: 'Levantar QUANTO o cliente efetivamente pagou e como (parcelas, datas, meio de pagamento, comprovantes/extratos). Sem isso o PED02 (restituicao integral) nao tem valor e o valor da causa nao se fecha.'
  responsavel: cliente
  prioridade: critica
  bloqueia: [G2, G3]
  mensagem_cliente: os comprovantes de TUDO que voce ja pagou para essa empresa (extrato, recibo, print do banco) e a data de cada pagamento
- id: PEN06
  descricao: 'RELOGIO MATERIAL — verificar NA BASE_LEGAL (nao de memoria) quais os
    prazos de decadencia/prescricao que correm contra este caso e a partir de quando:
    a contratacao e de ~set/out 2025, a promessa venceu em dez/2025 e o ultimo
    contato foi 18/03/2026. Nao ha prazo PROCESSUAL (ainda nao ha processo), mas o
    relogio material ja corre e precisa de data certa antes do G1 declarar
    "sem prazos".'
  responsavel: advogado
  prioridade: critica
  bloqueia: [G2, G3]
- id: PEN05
  descricao: 'Apurar o que aconteceu com os CODIGOS que o cliente enviou (F06): se houve lance ofertado em nome dele, alteracao cadastral ou movimentacao no portal sem autorizacao. Pedir ao cliente o acesso ao portal/e-mails e conferir. Pode mudar a natureza do pedido.'
  responsavel: advogado
  prioridade: alta
  bloqueia: [G2]
