# =====================================================================
# CASO.yaml — FONTE DA VERDADE deste caso (SOJ, blueprint secao 3).
# Modelo comentado completo: ESCRITORIO/MODELOS/CASO.schema.yaml
# Regra de ouro: informacao vive AQUI, uma unica vez. Views sao geradas.
# IDs estaveis: PT=parte, F=fato, P=prova, PED=pedido, PZ=prazo, PEN=pendencia.
# =====================================================================

caso:
  id: 2026-0001
  titulo: "Maria Ficticia x Joao Ficticio — Alimentos c/c Guarda (CASO DE TESTE)"
  area: familia                # familia | consumidor | bancario | ...
  modulo: familia/alimentos_guarda_convivencia            # ex.: familia/alimentos_guarda_convivencia
  complexidade: simples  # simples | padrao | complexo (D9)
  fase: E2_estrategia           # E1_intake | E2_estrategia | E3_minuta | E4_protocolo | ativo | encerrado
  comarca: "Parauapebas/PA"
  polo: ativo                   # baseline do laboratorio (teste do modo defesa concluido em 06/07 — DIARIO #036/#037)
  segredo_justica: true  # true quando ha menores / dados sensiveis
  gates:
    G1:
      status: aprovado
      data: '2026-07-06'
      diario: '#035'
    G2:
      status: reprovado
      data: '2026-07-06'
      diario: '#030'
    G3: {status: pendente}

partes:
- {id: PT01, papel: autora_representante, nome: "Maria Ficticia da Silva", cpf: "000.000.000-00", renda_mensal: 1621.00, qualificacao: completa}
- {id: PT02, papel: reu, nome: "Joao Ficticio de Souza", endereco: {status: nao_confirmado, pendencia: PEN02}}
- {id: PT03, papel: alimentanda, nome: "Ana Ficticia de Souza", nascimento: 2018-05-10, qualificacao: completa}

fatos:
# status: provado | alegado | controverso. Provado exige prova; sem prova,
# abrir pendencia (ou campo justificativa: "...").
- id: F01
  descricao: "Filiacao da menor Ana em relacao ao reu (FICTICIO)"
  status: provado
  provas:
  - P01
  pendencias: []
  justificativa: "certidao de nascimento prometida pela cliente para hoje"
- id: F02
  descricao: "Inadimplencia alimentar do reu desde jan/2026 (FICTICIO)"
  status: alegado
  provas: []
  pendencias: [PEN01]
- id: F03
  descricao: "Adversario alega inadimplemento contratual de 3 parcelas de R$ 350,00 (TESTE MODO DEFESA)"
  status: alegado_pelo_adversario
  provas: [P02]
  nota: "tese da inicial adversaria ficticia — ver analise adversarial na ESTRATEGIA"

provas:
- id: P01
  doc: 01_documentos/DOC-01_CERTIDAO_NASCIMENTO_ANA_FICTICIA.pdf
  original: 00_originais/certidao ana - foto do cartorio.pdf
  o_que_prova: Filiacao e idade da menor (FICTICIO)
  forca: plena
  fragilidade:
- id: P02
  doc: 01_documentos/DOC-02_INICIAL_ADVERSARIA_COBRANCA_FICTICIA.md
  original: 00_originais/inicial_adversaria_falsa.md
  o_que_prova: Peca do adversario — teses e pedidos da cobranca (FICTICIO)
  forca: relativa
  fragilidade:
  categoria: peca_adversaria
# Registradas pelo receber_documento.py — nao preencher a mao sem necessidade.
# - { id: P01, doc: "01_documentos/DOC-01_....pdf", original: "00_originais/...",
#     o_que_prova: "...", forca: plena, fragilidade: null }

pedidos:
- {id: PED01, tipo: alimentos_provisorios_e_definitivos, parametro: "a fixar na E2 (arvore do modulo)", fundamentos: [CC:art1694, LEI5478:art4], fatos: [F01, F02]}

fundamentos_citados: []
# Espelho local da BASE_LEGAL (D6). validade_dias: 90 padrao / 30 alterada.
# nucleo: true => rechecagem obrigatoria na vespera do protocolo (G3).
# - { ref: "CC:art1694", verificado_em: 2026-01-01, status: vigente,
#     validade_dias: 90, nucleo: true }

prazos:
# Caso genuinamente sem prazos: registrar NOTA "SEM PRAZOS" no DIARIO.
# status: ativo (padrao) | cumprido | prejudicado — o vigia so alerta ativos.
- {id: PZ01, descricao: "Meta interna: protocolar a inicial (FICTICIO)", data: 2026-07-31, criticidade: media}
- {id: PZ02, descricao: "TESTE DO VIGIA: prazo vencido de mentira", data: 2026-06-30, criticidade: alta, status: prejudicado, nota: "prazo ficticio criado so para testar o vigia; teste concluido em 04/07/2026 (alerta disparou 1x e nao duplicou)"}
- {id: PZ03, descricao: "TESTE DO VIGIA: prazo a 5 dias de mentira", data: 2026-07-09, criticidade: media, status: prejudicado, nota: "prazo ficticio criado so para testar o vigia; teste concluido em 04/07/2026"}
- {id: PZ04, descricao: "PRAZO DE RESPOSTA (contestacao) a inicial adversaria ficticia — 15 dias uteis simulados (TESTE MODO DEFESA)", data: 2026-07-10, criticidade: alta, resposta: true, origem: "DOC-02 (P02)",
   status: prejudicado, nota: "prazo ficticio do teste do modo defesa; teste concluido em 06/07/2026 (item zero reprovou sem ele e aprovou 8/8 com ele; vigia alertou D-4)"}

pendencias:
# responsavel: cliente | advogado | terceiro; prioridade: critica|alta|media|baixa
# critica DEVE ter bloqueia: [G2] e/ou [G3]. status: aberta (padrao) | resolvida.
# mensagem_cliente: versao leiga p/ checklist WhatsApp (opcional).
- {id: PEN01, descricao: "Comprovantes de despesas da menor e da inadimplencia (F02)", responsavel: cliente, prioridade: critica, bloqueia: [G3], mensagem_cliente: "os comprovantes das despesas da Ana (escola, saude) e prints das conversas sobre a pensao"}
- {id: PEN02, descricao: "Confirmar endereco atual do reu", responsavel: advogado, prioridade: critica, bloqueia: [G3]}

declaracoes:
# Registros estruturados exigidos pelos gates (Adendo A2).
  checklist_cliente_enviado: {diario: '#003', data: 2026-07-04}
