# =============================================================================
# MODELO COMENTADO DO CASO.yaml — a fonte da verdade de cada caso
# (SOJ Blueprint v1.3, seção 3 — os exemplos vêm do CASO_TESTE_001)
#
# COMO LER ESTE ARQUIVO:
#   - Tudo depois de "#" é comentário (explicação), não é dado.
#   - Este é um MODELO de referência. O arquivo real de cada caso é criado
#     automaticamente pelo script novo_caso.py, já com esta estrutura.
#
# REGRA DE OURO: informação vive AQUI, uma única vez. STATUS, quadros,
# checklists e o painel são GERADOS a partir deste arquivo (gerar_views.py).
#
# IDs ESTÁVEIS (nunca renumerar depois de criados):
#   PT## = parte  · F## = fato · P## = prova · PED## = pedido
#   PZ## = prazo  · PEN## = pendência
# =============================================================================

caso:
  id: 2026-0001               # identificador do sistema — a PASTA usa o nome do cliente
  titulo: "Tânia x Cícero — Alimentos c/c Guarda e Regulamentação de Convivência"
  area: familia                 # familia | consumidor | bancario | (outra)
  modulo: familia/alimentos_guarda_convivencia   # área/tipo_de_acao (contrato do módulo, seção 9)
  complexidade: padrao          # simples | padrao | complexo — decide a profundidade (D9)
  fase: E3_minuta               # fase INTERNA do pipeline: E1_intake | E2_estrategia | E3_minuta | E4_protocolo | ativo | encerrado
  fase_processual: pre_protocolo  # fase do PROCESSO no mundo (Onda 1/F6): pre_protocolo | postulatoria |
                                  # instrutoria | decisoria | recursal | cumprimento | encerrado
  comarca: "Parauapebas/PA"
  polo: ativo                   # ativo (autor) | passivo (réu/executado) — MODO DEFESA (v1.7):
                                # no passivo, o G1 ganha ITEM ZERO (prazo de resposta ativo com
                                # resposta: true), alegações adversárias usam status
                                # alegado_pelo_adversario, e a simulação adversária é invertida
  segredo_justica: true         # true quando há menores, dados sensíveis etc.
  gates:                        # preenchido automaticamente pelo gate_check.py
    G1: { status: aprovado, data: 2026-06-20, diario: "#012" }
    G2: { status: aprovado, data: 2026-06-28, diario: "#019" }
    G3: { status: pendente }    # pendente | aprovado | reprovado

partes:
  # papel: autora_representante | autor | reu | alimentanda | alimentando | terceiro...
  # qualificacao: completa — OU aponte a lacuna como pendência (vira dado, não parágrafo)
  - { id: PT01, papel: autora_representante, nome: "Tânia …", cpf: "…",
      renda_mensal: 1621.00, qualificacao: completa }
  - { id: PT02, papel: reu, nome: "Cícero …",
      endereco: { status: nao_confirmado, pendencia: PEN03 } }  # ← lacuna vira dado
  - { id: PT03, papel: alimentanda, nome: "Jullia …", nascimento: 2014-01-01, doc: P01 }

fatos:
  # status: provado | alegado | controverso | alegado_pelo_adversario (modo defesa)
  # Fato "provado" DEVE ter ao menos uma prova. Fato sem prova DEVE ter
  # pendência aberta (ou campo justificativa: "…" com a razão estratégica).
  # fonte_autos (Onda 5/F6): fato provado PELOS AUTOS anexados usa a
  # referência por folha no lugar de P## — ex.: fonte_autos: "fls. 24-25
  # (ata de audiência)". O G1 aceita provado com provas: [P##] OU fonte_autos.
  - id: F01
    descricao: "Filiação dos menores em relação ao réu"
    status: provado
    provas: [P01]
    pedidos: [PED01]            # opcional: pedidos que este fato sustenta
  - id: F04
    descricao: "Inadimplência alimentar do réu desde a separação"
    status: alegado
    provas: []
    pendencias: [PEN01]         # o que falta para provar

provas:
  # doc = cópia renomeada · original = como chegou (cadeia de custódia é um CAMPO)
  # forca: plena | relativa | indiciaria
  # categoria (roteador v1.7): peca_adversaria | decisao | sentenca_favoravel
  #   | conversa_whatsapp (Onda 4 — via receber_whatsapp.py) (ausente = prova comum)
  # Decisões judiciais (Onda 1/F6) ganham ainda: juizo, comarca, resultado
  # (preenchidos pela porta única via --juizo/--resultado)
  # sha256 (Onda 4/F6): hash do original na ENTRADA — cadeia de custódia;
  #   preenchido automaticamente pela porta única (conversas: hash do .txt,
  #   manifesto por arquivo dentro do próprio DOC de cronologia)
  - id: P01
    doc: "01_documentos/DOC-01_CERTIDAO_NASCIMENTO_JULLIA.pdf"
    original: "00_originais/D-03.jpg"
    o_que_prova: "Filiação e idade da menor"
    forca: plena
    fragilidade: null           # ex.: "cópia sem autenticação", "data ilegível"

instrumentais: []
# Classe própria (v1.10, porta de importação): provam REPRESENTAÇÃO, não fato
# — procuração ASSINADA, RG/CNH, contrato de honorários, hipossuficiência.
# tipo: procuracao | identidade | contrato_honorarios | hipossuficiencia | outro
# Rascunho de instrumental (ex.: procuração em Word) NÃO entra aqui: _efemeros.
# - { id: INS01, tipo: procuracao, doc: "01_documentos/DOC-02_....pdf",
#     original: "00_originais/importacao_.../...", sha256: "...",
#     origem: "colaborador FULANO" }

propostas_colaborador: []
# Decisões EMBUTIDAS na peça importada (quantum, foro, tutelas) — governança
# de autoria (v1.10): nada de colaborador vira decisão sem ratificação do
# titular. status: aguardando_ratificacao | ratificada | vetada.
# O G2 (item 7) BLOQUEIA enquanto houver aguardando_ratificacao.
# - { id: PC01, tema: quantum, proposta: "...", observacao: "...",
#     origem: "colaborador FULANO", status: aguardando_ratificacao,
#     diario: "#003" }

pedidos:
  # parametro: o valor/critério fixado — cite a entrada do DIARIO que decidiu (D11)
  - id: PED01
    tipo: alimentos_provisorios_e_definitivos
    parametro: "30% SM/filho — DECISAO_SISTEMA #015, ratificada em #019"
    fundamentos: [LEI5478:art4, CC:art1694, CC:art1706]
    fatos: [F01, F04]

fundamentos_citados:
  # Espelho local do que este caso usa da BASE_LEGAL (verificação com validade — D6).
  # validade_dias: 90 (padrão) | 30 (lei com alteração recente)
  # nucleo: true = dispositivo-núcleo → rechecagem obrigatória na véspera do protocolo (G3)
  - { ref: "CC:art1694", verificado_em: 2026-06-30, status: vigente, validade_dias: 90, nucleo: true }
  - { ref: "ECA:art22",  verificado_em: 2026-06-30, status: vigente_com_alteracao_2025,
      validade_dias: 30, nota: "redação alterada — usar texto atual, ver verbete" }

financeiro:                     # Onda 1/F6 — dinheiro do caso, fonte única
  contrato:
    tipo: fixo                  # fixo | percentual | exito | misto | probono
    valor: 3000.00              # honorários contratados (se fixo/misto); percentual na nota
    parcelas: 3
    doc_assinado: false         # true quando o contrato assinado estiver arquivado (DOC-NN)
    # Contrato assinado é PENDÊNCIA PADRÃO do intake (novo_caso cria PEN##
    # automaticamente, salvo --probono / gratuidade marcada).
  custas:                       # desembolsos do caso
    - { data: 2026-07-10, descricao: "custas iniciais", valor: 150.00 }
  recebimentos:
    - { data: 2026-07-05, descricao: "parcela 1/3", valor: 1000.00 }

audiencias: []                  # Onda 1/F6 — povoado pelo "preparar audiência" (Onda 2)
# - { data: 2026-08-15, hora: "09:00", tipo: instrucao|conciliacao, local: "...",
#     status: designada|realizada|adiada, pasta: "AUDIENCIAS/2026-08-15_instrucao/", ata: P## }

prazos:
  # criticidade: alta | media | baixa. Incluir prescrição/decadência quando aplicável.
  # status: ativo (padrão, pode omitir) | cumprido | prejudicado (+ nota justificando).
  # resposta: true = prazo de RESPOSTA (contestação/embargos) — ITEM ZERO do G1 em polo passivo.
  # origem: "DOC-NN (P##)" quando extraído de decisão/sentença pela porta única.
  #   O VIGIA DE PRAZOS (vigia_prazos.py, Adendo A1) roda no início de toda sessão:
  #   prazo ATIVO vencido ou a <= 7 dias gera ALERTA no DIARIO e destaque no PAINEL.
  # Caso genuinamente sem prazos: registrar entrada NOTA no DIARIO contendo "SEM PRAZOS".
  - { id: PZ01, descricao: "Protocolar antes do recesso", data: 2026-07-15, criticidade: alta }

pendencias:
  # responsavel: cliente | advogado | terceiro
  # prioridade: critica | alta | media | baixa — crítica DEVE dizer o que bloqueia
  # bloqueia: [G2] e/ou [G3] — trava o portão até resolver
  # status: aberta (padrão, pode omitir) | resolvida (+ resolvida_em: data)
  # mensagem_cliente: versão em linguagem leiga p/ o checklist de WhatsApp (opcional)
  #
  # ROBUSTEZ DOS GATES (blueprint §6) — EXCEÇÕES/JUSTIFICATIVAS SÃO CAMPOS, NÃO TEXTO LIVRE:
  # - pedido sem prova prévia → no PRÓPRIO pedido:
  #     excecao_prova: { motivo: "...", diario: "#NNN" }   (entrada existente!)
  # - atos declarados p/ os gates → bloco de nível raiz `declaracoes:` com
  #     checklist_cliente_enviado / anti_erro_fatal / conferencia_final /
  #     revisao_humana_integral: { diario: "#NNN", data: ... }
  #     aceites_de_risco: [{ risco: "...", diario: "#NNN" }]
  #     sem_prazos: { motivo: "...", diario: "#NNN" }
  #   O gate valida que a referência `diario` aponta entrada QUE EXISTE.
  - { id: PEN01, descricao: "Extrato bancário 12 meses (comprovar F04)",
      responsavel: cliente, prioridade: critica, bloqueia: [G3],
      mensagem_cliente: "o extrato da sua conta dos últimos 12 meses (pode ser do app do banco)" }
  - { id: PEN03, descricao: "Confirmar endereço atual do réu no RJ",
      responsavel: advogado, prioridade: critica, bloqueia: [G3] }
